# Aura Living — Continuous Integration
# Blocks merge on any lint / type / build failure.
# Test job activates in Phase 12 (Testing Foundation).

name: CI

on:
  pull_request:
    branches: [main, production-hardening]
  push:
    branches: [main, production-hardening]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint + TypeCheck + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
      DIRECT_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      SUPABASE_SERVICE_ROLE_KEY: "placeholder"
      JWT_SECRET: "ci-placeholder-secret-not-for-production-use-32chars-min"
      JWT_ACCESS_EXPIRY: "15m"
      JWT_REFRESH_EXPIRY: "7d"
      NEXT_PUBLIC_SITE_URL: "https://aura-living.vercel.app"
      CRON_SECRET: "ci-placeholder-cron-secret"
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: "placeholder"
      CLOUDINARY_API_KEY: "placeholder"
      CLOUDINARY_API_SECRET: "placeholder"
      RESEND_API_KEY: "re_placeholder"
      EMAIL_FROM: "Aura Living <noreply@example.com>"
      UPSTASH_REDIS_REST_URL: "https://placeholder.upstash.io"
      UPSTASH_REDIS_REST_TOKEN: "placeholder"
      SENTRY_DSN: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: ESLint
        run: bun run lint

      - name: TypeScript type check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build

      - name: Upload build artifact (for inspection on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/
          retention-days: 3

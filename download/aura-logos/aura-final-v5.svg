<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <!-- AURA LIVING — Final Logo v5 (closer match to reference)
       Taller house, warmer yellow, bigger picture frame, more spacious interior -->

  <rect width="800" height="1000" fill="#FFFFFF"/>

  <g transform="translate(400, 380)" stroke="#000000" stroke-linejoin="round" stroke-linecap="round">

    <!-- ============ HOUSE STRUCTURE (taller, wider) ============ -->
    <!-- Left wall (warm yellow — warmer than v4) -->
    <rect x="-130" y="-40" width="130" height="220" fill="#F9D371"/>
    <!-- Right wall (light beige) -->
    <rect x="0" y="-40" width="130" height="220" fill="#E8D5C4"/>

    <!-- Triangular roof (taller peak) -->
    <polygon points="-130,-40 0,-130 130,-40" fill="#F9D371"/>
    <polygon points="0,-130 130,-40 0,-40" fill="#E8D5C4"/>

    <!-- Outlines -->
    <line x1="-130" y1="-40" x2="0" y2="-130" stroke="#000000" stroke-width="2.2"/>
    <line x1="0" y1="-130" x2="130" y2="-40" stroke="#000000" stroke-width="2.2"/>
    <line x1="-130" y1="-40" x2="-130" y2="180" stroke="#000000" stroke-width="2.2"/>
    <line x1="130" y1="-40" x2="130" y2="180" stroke="#000000" stroke-width="2.2"/>
    <line x1="0" y1="-40" x2="0" y2="180" stroke="#000000" stroke-width="1.5"/>
    <line x1="-130" y1="180" x2="130" y2="180" stroke="#000000" stroke-width="2.2"/>

    <!-- ============ WALL ART (bigger square frame, upper-left wall) ============ -->
    <rect x="-105" y="-20" width="40" height="40" fill="#E8D5C4" stroke="#000000" stroke-width="1.8"/>
    <!-- Subtle inner line (suggests picture content) -->
    <line x1="-100" y1="5" x2="-70" y2="5" stroke="#000000" stroke-width="1"/>

    <!-- ============ SIDE TABLE (left of sofa, with vertical stripes) ============ -->
    <rect x="-105" y="115" width="45" height="45" fill="#FFFFFF" stroke="#000000" stroke-width="1.8"/>
    <!-- Vertical stripes (more visible) -->
    <line x1="-96" y1="115" x2="-96" y2="160" stroke="#000000" stroke-width="1.2"/>
    <line x1="-87" y1="115" x2="-87" y2="160" stroke="#000000" stroke-width="1.2"/>
    <line x1="-78" y1="115" x2="-78" y2="160" stroke="#000000" stroke-width="1.2"/>
    <line x1="-69" y1="115" x2="-69" y2="160" stroke="#000000" stroke-width="1.2"/>

    <!-- ============ PLANT (on top of side table, 3 leaves) ============ -->
    <!-- Pot (white, slightly tapered) -->
    <path d="M -95 95 L -93 115 L -75 115 L -73 95 Z" fill="#FFFFFF" stroke="#000000" stroke-width="1.8"/>
    <!-- 3 leaves (light green, varied angles) -->
    <ellipse cx="-88" cy="85" rx="6" ry="13" fill="#A8D5A8" stroke="#000000" stroke-width="1.4" transform="rotate(-20 -88 85)"/>
    <ellipse cx="-80" cy="82" rx="6" ry="14" fill="#A8D5A8" stroke="#000000" stroke-width="1.4" transform="rotate(15 -80 82)"/>
    <ellipse cx="-93" cy="88" rx="5" ry="11" fill="#A8D5A8" stroke="#000000" stroke-width="1.4" transform="rotate(-40 -93 88)"/>

    <!-- ============ SOFA (centered, with 2 cushions visible + shadow) ============ -->
    <!-- Shadow beneath sofa -->
    <ellipse cx="0" cy="178" rx="70" ry="5" fill="#E0E0E0" stroke="none"/>
    <!-- Back rest (taller, with 2 cushion dividers) -->
    <rect x="-50" y="95" width="100" height="32" rx="8" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
    <!-- 2 back cushion dividers -->
    <line x1="-17" y1="95" x2="-17" y2="127" stroke="#000000" stroke-width="1.5"/>
    <line x1="17" y1="95" x2="17" y2="127" stroke="#000000" stroke-width="1.5"/>
    <!-- Seat cushion -->
    <rect x="-52" y="122" width="104" height="35" rx="8" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
    <!-- Seat cushion divider -->
    <line x1="0" y1="122" x2="0" y2="157" stroke="#000000" stroke-width="1.5"/>
    <!-- Left armrest -->
    <rect x="-62" y="103" width="12" height="50" rx="5" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
    <!-- Right armrest -->
    <rect x="50" y="103" width="12" height="50" rx="5" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>

    <!-- ============ FLOOR LAMP (right of sofa, curved stem + round shade + light beam) ============ -->
    <!-- Curved stem (taller, more elegant curve) -->
    <path d="M 85 180 Q 95 110 88 55 Q 84 38 65 36" fill="none" stroke="#000000" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Lampshade (circular, white) -->
    <circle cx="65" cy="28" r="11" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
    <!-- Yellow light beam (pale yellow, angled down toward sofa) -->
    <path d="M 58 38 L 35 95 L 48 100 L 65 45 Z" fill="#FFF3B8" stroke="none" opacity="0.85"/>
    <!-- Base (small black ellipse on floor) -->
    <ellipse cx="85" cy="180" rx="7" ry="2.5" fill="#000000" stroke="none"/>

  </g>

  <!-- ============================================================
       TEXT — AURA LIVING
       Bold sans-serif, tight letter spacing, black, centered
       ============================================================ -->
  <text x="400" y="720"
        font-family="Arial Black, Montserrat ExtraBold, Helvetica, Arial, sans-serif"
        font-size="76" font-weight="900"
        fill="#000000"
        text-anchor="middle"
        letter-spacing="0">AURA LIVING</text>

</svg>

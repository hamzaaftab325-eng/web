<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!-- House mark only v9 — M-shaped roof (favicon) -->
  <g transform="translate(120, 120)" stroke="#000000" stroke-linejoin="round" stroke-linecap="round">
    <!-- Left half (yellow) — wall + roof as one shape, taller peak -->
    <path d="M -56 80 L -56 -10 L -28 -52 L 0 -16 L 0 80 Z" fill="#F5E6A3" stroke="#000000" stroke-width="2.5"/>
    <!-- Right half (brown) — wall + roof as one shape, shorter peak -->
    <path d="M 0 -16 L 28 -38 L 56 -10 L 56 80 L 0 80 Z" fill="#C9A87C" stroke="#000000" stroke-width="2.5"/>
    <!-- Center vertical wall -->
    <line x1="0" y1="-16" x2="0" y2="80" stroke="#000000" stroke-width="2"/>
    <!-- Floor line -->
    <line x1="-56" y1="80" x2="56" y2="80" stroke="#000000" stroke-width="2"/>

    <!-- Picture frame -->
    <rect x="-44" y="2" width="19" height="14" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>

    <!-- Floor lamp -->
    <path d="M 30 80 Q 38 40 32 4 Q 28 -8 16 -6" fill="none" stroke="#000000" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M 10 -6 Q 10 -14 16 -14 Q 22 -14 22 -6 Z" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
    <ellipse cx="30" cy="80" rx="5" ry="1.5" fill="#000000" stroke="none"/>

    <!-- Sofa -->
    <rect x="-21" y="32" width="42" height="14" rx="6" fill="#FFFFFF" stroke="#000000" stroke-width="2.2"/>
    <rect x="-22" y="45" width="45" height="16" rx="5" fill="#FFFFFF" stroke="#000000" stroke-width="2.2"/>
    <rect x="-27" y="38" width="7" height="23" rx="3" fill="#FFFFFF" stroke="#000000" stroke-width="2.2"/>
    <rect x="20" y="38" width="7" height="23" rx="3" fill="#FFFFFF" stroke="#000000" stroke-width="2.2"/>

    <!-- Plant in striped pot -->
    <rect x="-45" y="58" width="10" height="22" fill="#A0826D" stroke="#000000" stroke-width="2"/>
    <line x1="-42" y1="60" x2="-42" y2="78" stroke="#000000" stroke-width="0.8"/>
    <line x1="-38" y1="60" x2="-38" y2="78" stroke="#000000" stroke-width="0.8"/>
    <rect x="-47" y="56" width="13" height="2.5" fill="#A0826D" stroke="#000000" stroke-width="2"/>
    <ellipse cx="-42" cy="50" rx="2.5" ry="6" fill="#8FBC8F" stroke="#000000" stroke-width="1.5" transform="rotate(-15 -42 50)"/>
    <ellipse cx="-38" cy="48" rx="2.5" ry="7" fill="#8FBC8F" stroke="#000000" stroke-width="1.5" transform="rotate(10 -38 48)"/>
    <ellipse cx="-43" cy="47" rx="2" ry="5.5" fill="#8FBC8F" stroke="#000000" stroke-width="1.5" transform="rotate(-25 -43 47)"/>
  </g>
</svg>

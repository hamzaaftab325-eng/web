<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!-- House mark only v3 (favicon / app icon) — matches full logo -->
  <g transform="translate(120, 115)" stroke="#1A1714" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round">

    <!-- Left half (yellow) -->
    <path d="M -70 70 L -70 -8 L 0 -70 L 0 70 Z" fill="#F5E6A3" stroke="#1A1714" stroke-width="2.5"/>
    <!-- Right half (tan) -->
    <path d="M 0 -70 L 70 -8 L 70 70 L 0 70 Z" fill="#E8D5B7" stroke="#1A1714" stroke-width="2.5"/>
    <line x1="0" y1="-70" x2="0" y2="70" stroke="#1A1714" stroke-width="2"/>

    <!-- Picture frame -->
    <rect x="-54" y="-2" width="18" height="18" fill="#C4A886" stroke="#1A1714" stroke-width="2"/>
    <line x1="-50" y1="9" x2="-40" y2="9" stroke="#1A1714" stroke-width="1.5"/>

    <!-- Plant pot (square) -->
    <rect x="-60" y="48" width="15" height="18" fill="#A0826D" stroke="#1A1714" stroke-width="2"/>
    <!-- Leaves -->
    <ellipse cx="-60" cy="44" rx="4" ry="6" fill="#8FBC8F" stroke="#1A1714" stroke-width="1.5"/>
    <ellipse cx="-53" cy="42" rx="4" ry="7" fill="#8FBC8F" stroke="#1A1714" stroke-width="1.5"/>
    <ellipse cx="-64" cy="40" rx="3.5" ry="5" fill="#8FBC8F" stroke="#1A1714" stroke-width="1.5"/>
    <ellipse cx="-56" cy="37" rx="3.5" ry="6" fill="#8FBC8F" stroke="#1A1714" stroke-width="1.5"/>
    <ellipse cx="-62" cy="35" rx="3" ry="5" fill="#8FBC8F" stroke="#1A1714" stroke-width="1.5"/>

    <!-- Sofa -->
    <rect x="-23" y="25" width="46" height="17" rx="3" fill="#F0F0F0" stroke="#1A1714" stroke-width="2"/>
    <line x1="0" y1="25" x2="0" y2="42" stroke="#1A1714" stroke-width="1.5"/>
    <rect x="-25" y="42" width="50" height="17" rx="3" fill="#F0F0F0" stroke="#1A1714" stroke-width="2"/>
    <rect x="-30" y="33" width="7" height="26" rx="2" fill="#F0F0F0" stroke="#1A1714" stroke-width="2"/>
    <rect x="23" y="33" width="7" height="26" rx="2" fill="#F0F0F0" stroke="#1A1714" stroke-width="2"/>

    <!-- Floor lamp with round shade -->
    <path d="M 45 66 Q 50 42 55 33" fill="none" stroke="#1A1714" stroke-width="2"/>
    <circle cx="55" cy="29" r="7.5" fill="#FFFFFF" stroke="#1A1714" stroke-width="2"/>
    <ellipse cx="45" cy="66" rx="5" ry="1.5" fill="#1A1714" stroke="none"/>
  </g>
</svg>

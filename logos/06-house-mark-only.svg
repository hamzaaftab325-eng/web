<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!-- House mark only (favicon / app icon) — matches full logo v2 -->
  <g transform="translate(120, 115)" stroke="#1A1714" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" fill="none">

    <!-- Roof triangle -->
    <path d="M -75 -8 L 0 -70 L 75 -8 Z" fill="#FAF6EE"/>

    <!-- Left wall -->
    <rect x="-75" y="-8" width="75" height="82" fill="#F5E6A3" stroke="#1A1714" stroke-width="2.5"/>
    <!-- Right wall -->
    <rect x="0" y="-8" width="75" height="82" fill="#E8D5B7" stroke="#1A1714" stroke-width="2.5"/>

    <!-- Roof outline -->
    <path d="M -75 -8 L 0 -70 L 75 -8" fill="none" stroke="#1A1714" stroke-width="2.5"/>
    <line x1="-75" y1="-8" x2="75" y2="-8" stroke="#1A1714" stroke-width="2.5"/>

    <!-- Wall art -->
    <rect x="-60" y="4" width="22" height="22" fill="#C4A886" stroke="#1A1714" stroke-width="2"/>
    <line x1="-56" y1="18" x2="-42" y2="18" stroke="#1A1714" stroke-width="1.5"/>

    <!-- Plant pot -->
    <path d="M -65 66 L -62 53 L -50 53 L -47 66 Z" fill="#D0D0D0" stroke="#1A1714" stroke-width="2"/>
    <ellipse cx="-60" cy="47" rx="4" ry="8" fill="#8FBC8F" stroke="#1A1714" stroke-width="1.5"/>
    <ellipse cx="-54" cy="45" rx="4" ry="9" fill="#8FBC8F" stroke="#1A1714" stroke-width="1.5"/>
    <ellipse cx="-65" cy="46" rx="3.5" ry="7" fill="#8FBC8F" stroke="#1A1714" stroke-width="1.5"/>

    <!-- Sofa -->
    <rect x="-25" y="30" width="50" height="18" rx="3" fill="#F0F0F0" stroke="#1A1714" stroke-width="2"/>
    <line x1="0" y1="30" x2="0" y2="48" stroke="#1A1714" stroke-width="1.5"/>
    <rect x="-27" y="46" width="54" height="18" rx="3" fill="#F0F0F0" stroke="#1A1714" stroke-width="2"/>
    <rect x="-32" y="38" width="7" height="26" rx="2" fill="#F0F0F0" stroke="#1A1714" stroke-width="2"/>
    <rect x="25" y="38" width="7" height="26" rx="2" fill="#F0F0F0" stroke="#1A1714" stroke-width="2"/>

    <!-- Floor lamp -->
    <path d="M 50 66 Q 55 42 60 38" fill="none" stroke="#1A1714" stroke-width="2"/>
    <path d="M 54 38 L 67 38 L 69 30 L 52 30 Z" fill="#FFFFFF" stroke="#1A1714" stroke-width="2"/>
    <ellipse cx="50" cy="66" rx="5" ry="1.5" fill="#1A1714" stroke="none"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!-- House mark only v8.1 — TWO SEPARATE HOUSES (favicon) -->
  <g transform="translate(120, 120)" stroke="#000000" stroke-linejoin="round" stroke-linecap="round">
    <!-- Left house (yellow, taller peak) -->
    <rect x="-58" y="-10" width="58" height="90" fill="#F5E6A3" stroke="#000000" stroke-width="2.5"/>
    <path d="M -58 -10 L -29 -54 L 0 -10 Z" fill="#F5E6A3" stroke="#000000" stroke-width="2.5"/>
    <!-- Right house (warm brown, shorter peak) -->
    <rect x="0" y="-10" width="58" height="90" fill="#C9A87C" stroke="#000000" stroke-width="2.5"/>
    <path d="M 0 -10 L 29 -36 L 58 -10 Z" fill="#C9A87C" stroke="#000000" stroke-width="2.5"/>

    <!-- Picture frame (rectangular) -->
    <rect x="-46" y="2" width="20" height="14" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>

    <!-- Floor lamp with curved arm + dome shade -->
    <path d="M 32 80 Q 40 40 34 4 Q 30 -8 18 -6" fill="none" stroke="#000000" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M 11 -6 Q 11 -14 18 -14 Q 25 -14 25 -6 Z" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
    <ellipse cx="32" cy="80" rx="5" ry="1.5" fill="#000000" stroke="none"/>

    <!-- Sofa -->
    <rect x="-22" y="32" width="44" height="14" rx="6" fill="#FFFFFF" stroke="#000000" stroke-width="2.2"/>
    <rect x="-24" y="45" width="48" height="16" rx="5" fill="#FFFFFF" stroke="#000000" stroke-width="2.2"/>
    <rect x="-29" y="38" width="7" height="23" rx="3" fill="#FFFFFF" stroke="#000000" stroke-width="2.2"/>
    <rect x="22" y="38" width="7" height="23" rx="3" fill="#FFFFFF" stroke="#000000" stroke-width="2.2"/>

    <!-- Plant in striped pot -->
    <rect x="-46" y="58" width="10" height="22" fill="#A0826D" stroke="#000000" stroke-width="2"/>
    <line x1="-43" y1="60" x2="-43" y2="78" stroke="#000000" stroke-width="0.8"/>
    <line x1="-40" y1="60" x2="-40" y2="78" stroke="#000000" stroke-width="0.8"/>
    <rect x="-48" y="56" width="13" height="2.5" fill="#A0826D" stroke="#000000" stroke-width="2"/>
    <ellipse cx="-43" cy="50" rx="2.5" ry="6" fill="#8FBC8F" stroke="#000000" stroke-width="1.5" transform="rotate(-15 -43 50)"/>
    <ellipse cx="-40" cy="48" rx="2.5" ry="7" fill="#8FBC8F" stroke="#000000" stroke-width="1.5" transform="rotate(10 -40 48)"/>
    <ellipse cx="-45" cy="47" rx="2" ry="5.5" fill="#8FBC8F" stroke="#000000" stroke-width="1.5" transform="rotate(-25 -45 47)"/>
  </g>
</svg>

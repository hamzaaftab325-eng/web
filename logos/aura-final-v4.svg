<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <!-- AURA LIVING — Final Logo (matching reference exactly)
       Hand-crafted SVG based on detailed VLM analysis of reference image
       Clean geometric primitives, thin 1.5px black outlines, flat colors -->

  <!-- Pure white background -->
  <rect width="800" height="1000" fill="#FFFFFF"/>

  <!-- ============================================================
       ICON — Modern house with split interior
       Centered at (400, 350), spans 400x400 area
       ============================================================ -->
  <g transform="translate(400, 350)" stroke="#000000" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">

    <!-- ============ HOUSE STRUCTURE ============ -->
    <!-- Left wall (warm yellow #F9D371) -->
    <rect x="-100" y="-30" width="100" height="180" fill="#F9D371"/>
    <!-- Right wall (light beige #E8D5C4) -->
    <rect x="0" y="-30" width="100" height="180" fill="#E8D5C4"/>

    <!-- Triangular roof (peak at top center) -->
    <polygon points="-100,-30 0,-100 100,-30" fill="#F9D371"/>
    <!-- Right half of roof — fill beige to match right wall -->
    <polygon points="0,-100 100,-30 0,-30" fill="#E8D5C4"/>

    <!-- House outline (drawn on top so it's clean) -->
    <!-- Roof outline -->
    <line x1="-100" y1="-30" x2="0" y2="-100" stroke="#000000" stroke-width="2"/>
    <line x1="0" y1="-100" x2="100" y2="-30" stroke="#000000" stroke-width="2"/>
    <!-- Left wall outline -->
    <line x1="-100" y1="-30" x2="-100" y2="150" stroke="#000000" stroke-width="2"/>
    <!-- Right wall outline -->
    <line x1="100" y1="-30" x2="100" y2="150" stroke="#000000" stroke-width="2"/>
    <!-- Center vertical wall divider -->
    <line x1="0" y1="-30" x2="0" y2="150" stroke="#000000" stroke-width="1.5"/>
    <!-- Floor / base -->
    <line x1="-100" y1="150" x2="100" y2="150" stroke="#000000" stroke-width="2"/>

    <!-- ============ WALL ART (square frame, upper-left wall) ============ -->
    <rect x="-80" y="-10" width="28" height="28" fill="#E8D5C4" stroke="#000000" stroke-width="1.5"/>

    <!-- ============ SIDE TABLE (left of sofa, with vertical stripes) ============ -->
    <rect x="-80" y="95" width="35" height="35" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
    <!-- Vertical stripes on table -->
    <line x1="-73" y1="95" x2="-73" y2="130" stroke="#000000" stroke-width="1"/>
    <line x1="-66" y1="95" x2="-66" y2="130" stroke="#000000" stroke-width="1"/>
    <line x1="-59" y1="95" x2="-59" y2="130" stroke="#000000" stroke-width="1"/>
    <line x1="-52" y1="95" x2="-52" y2="130" stroke="#000000" stroke-width="1"/>

    <!-- ============ PLANT (on top of side table) ============ -->
    <!-- Pot (small, white) -->
    <rect x="-72" y="78" width="18" height="18" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
    <!-- 3 leaves (light green) -->
    <ellipse cx="-67" cy="70" rx="5" ry="10" fill="#A8D5A8" stroke="#000000" stroke-width="1.2" transform="rotate(-20 -67 70)"/>
    <ellipse cx="-60" cy="68" rx="5" ry="11" fill="#A8D5A8" stroke="#000000" stroke-width="1.2" transform="rotate(10 -60 68)"/>
    <ellipse cx="-72" cy="72" rx="4" ry="8" fill="#A8D5A8" stroke="#000000" stroke-width="1.2" transform="rotate(-35 -72 72)"/>

    <!-- ============ SOFA (centered, lower half) ============ -->
    <!-- Shadow beneath sofa (light gray ellipse) -->
    <ellipse cx="0" cy="148" rx="55" ry="4" fill="#E0E0E0" stroke="none"/>
    <!-- Back rest (rounded rect, white) -->
    <rect x="-40" y="80" width="80" height="25" rx="6" fill="#FFFFFF" stroke="#000000" stroke-width="1.8"/>
    <!-- Seat cushion (rounded rect, white) -->
    <rect x="-42" y="100" width="84" height="28" rx="6" fill="#FFFFFF" stroke="#000000" stroke-width="1.8"/>
    <!-- Center cushion divider -->
    <line x1="0" y1="100" x2="0" y2="128" stroke="#000000" stroke-width="1.5"/>
    <!-- Left armrest -->
    <rect x="-48" y="88" width="10" height="40" rx="4" fill="#FFFFFF" stroke="#000000" stroke-width="1.8"/>
    <!-- Right armrest -->
    <rect x="38" y="88" width="10" height="40" rx="4" fill="#FFFFFF" stroke="#000000" stroke-width="1.8"/>

    <!-- ============ FLOOR LAMP (right of sofa) ============ -->
    <!-- Curved stem -->
    <path d="M 65 150 Q 75 100 70 50 Q 67 35 50 33" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
    <!-- Lampshade (circular, white) -->
    <circle cx="50" cy="28" r="9" fill="#FFFFFF" stroke="#000000" stroke-width="1.8"/>
    <!-- Yellow light beam (pale yellow, angled down toward sofa) -->
    <path d="M 45 35 L 25 75 L 35 80 L 50 40 Z" fill="#FFF3B8" stroke="none" opacity="0.8"/>
    <!-- Base (small black ellipse on floor) -->
    <ellipse cx="65" cy="150" rx="6" ry="2" fill="#000000" stroke="none"/>

  </g>

  <!-- ============================================================
       TEXT — AURA LIVING
       Bold sans-serif, tight letter spacing, black, centered
       ============================================================ -->
  <text x="400" y="640"
        font-family="Arial Black, Montserrat ExtraBold, Helvetica, Arial, sans-serif"
        font-size="72" font-weight="900"
        fill="#000000"
        text-anchor="middle"
        letter-spacing="0">AURA LIVING</text>

</svg>

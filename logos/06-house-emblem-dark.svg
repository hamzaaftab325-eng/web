<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <!-- House emblem — DARK version (for ink footer) -->
  <rect width="600" height="500" fill="#0B0B0B"/>

  <g transform="translate(300, 200)" stroke="#FAF6EE" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" fill="none">
    <!-- Roof peaks + ridge -->
    <path d="M -110 -10 L -55 -75 L 0 -10" fill="none"/>
    <path d="M 0 -10 L 55 -75 L 110 -10" fill="none"/>
    <line x1="-55" y1="-75" x2="55" y2="-75"/>

    <!-- Facades (darker warm tones for dark bg) -->
    <path d="M -110 -10 L -110 80 L 0 80 L 0 -10 L -55 -75 Z" fill="#B89548" stroke="#FAF6EE" stroke-width="2"/>
    <path d="M 0 -10 L 0 80 L 110 80 L 110 -10 L 55 -75 Z" fill="#8C6F4E" stroke="#FAF6EE" stroke-width="2"/>

    <!-- Wall art -->
    <rect x="-90" y="5" width="22" height="28" fill="#8C6F4E" stroke="#FAF6EE" stroke-width="1.5"/>
    <line x1="-86" y1="9" x2="-72" y2="9" stroke="#FAF6EE" stroke-width="0.75"/>
    <line x1="-86" y1="19" x2="-72" y2="19" stroke="#FAF6EE" stroke-width="0.75"/>

    <!-- Floor lamp -->
    <path d="M 80 80 Q 80 30 95 30" fill="none" stroke="#FAF6EE" stroke-width="1.5"/>
    <path d="M 88 30 L 102 30 L 105 20 L 85 20 Z" fill="#0B0B0B" stroke="#FAF6EE" stroke-width="1.5"/>
    <ellipse cx="80" cy="80" rx="8" ry="2" fill="#FAF6EE" stroke="none"/>

    <!-- Plant -->
    <path d="M -95 80 L -90 65 L -75 65 L -70 80 Z" fill="#8C6F4E" stroke="#FAF6EE" stroke-width="1.5"/>
    <path d="M -82 65 Q -88 50 -85 40" fill="none" stroke="#FAF6EE" stroke-width="1.5"/>
    <path d="M -82 65 Q -78 48 -72 42" fill="none" stroke="#FAF6EE" stroke-width="1.5"/>
    <path d="M -82 65 Q -82 50 -82 38" fill="none" stroke="#FAF6EE" stroke-width="1.5"/>

    <!-- Sofa -->
    <rect x="-30" y="35" width="60" height="20" rx="3" fill="#0B0B0B" stroke="#FAF6EE" stroke-width="1.5"/>
    <line x1="0" y1="35" x2="0" y2="55" stroke="#FAF6EE" stroke-width="1"/>
    <rect x="-35" y="55" width="70" height="20" rx="3" fill="#0B0B0B" stroke="#FAF6EE" stroke-width="1.5"/>
    <rect x="-40" y="45" width="10" height="30" rx="2" fill="#0B0B0B" stroke="#FAF6EE" stroke-width="1.5"/>
    <rect x="30" y="45" width="10" height="30" rx="2" fill="#0B0B0B" stroke="#FAF6EE" stroke-width="1.5"/>
    <line x1="-32" y1="75" x2="-32" y2="80" stroke="#FAF6EE" stroke-width="1.5"/>
    <line x1="32" y1="75" x2="32" y2="80" stroke="#FAF6EE" stroke-width="1.5"/>

    <line x1="-115" y1="80" x2="115" y2="80" stroke="#FAF6EE" stroke-width="2"/>
  </g>

  <text x="300" y="370" font-family="Montserrat, Poppins, Helvetica, Arial, sans-serif"
        font-size="46" font-weight="700" fill="#FAF6EE"
        text-anchor="middle" letter-spacing="2">AURA LIVING</text>
  <text x="300" y="408" font-family="Montserrat, Poppins, Helvetica, Arial, sans-serif"
        font-size="16" font-weight="400" fill="#D4AF37"
        text-anchor="middle" letter-spacing="7">SINCE 2026</text>
</svg>

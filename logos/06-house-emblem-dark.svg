<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <!-- AURA LIVING v5 — DARK version (for ink footer) -->
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1.5" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="floorShadowDark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="500" fill="#0B0B0B"/>

  <g transform="translate(300, 215)">
    <!-- House — left half (deep mustard for dark bg) -->
    <path d="M -100 100 L -100 -18 L -15 -90 L -15 100 Z"
          fill="#B89548" stroke="#F7F5F2" stroke-width="3"
          stroke-linejoin="round" stroke-linecap="round" paint-order="stroke fill"/>
    <!-- House — right half (deep tan) -->
    <path d="M -15 -90 L 100 -5 L 100 100 L -15 100 Z"
          fill="#8C6F4E" stroke="#F7F5F2" stroke-width="3"
          stroke-linejoin="round" stroke-linecap="round" paint-order="stroke fill"/>
    <line x1="-15" y1="-90" x2="-15" y2="100" stroke="#F7F5F2" stroke-width="2" stroke-linecap="round"/>
    <line x1="-100" y1="100" x2="100" y2="100" stroke="#F7F5F2" stroke-width="2.5" stroke-linecap="round"/>

    <ellipse cx="0" cy="100" rx="95" ry="6" fill="url(#floorShadowDark)"/>

    <!-- Framed art -->
    <g filter="url(#softShadow)">
      <rect x="-78" y="-8" width="32" height="32" rx="2" fill="#F7F5F2" stroke="#F7F5F2" stroke-width="2" stroke-linejoin="round" paint-order="stroke fill"/>
      <rect x="-75" y="-5" width="26" height="26" rx="1" fill="#0B0B0B"/>
      <rect x="-72" y="-2" width="20" height="20" fill="#8C6F4E"/>
      <line x1="-72" y1="8" x2="-52" y2="8" stroke="#F7F5F2" stroke-width="1.2" stroke-linecap="round"/>
      <circle cx="-56" cy="2" r="2" fill="#B89548" stroke="#F7F5F2" stroke-width="0.8"/>
    </g>

    <!-- Arched floor lamp -->
    <g filter="url(#softShadow)">
      <path d="M 65 100 Q 80 50 70 0 Q 60 -25 30 -18" fill="none" stroke="#F7F5F2" stroke-width="3" stroke-linecap="round"/>
      <path d="M 22 -18 Q 22 -28 30 -28 Q 38 -28 38 -18 Z" fill="#0B0B0B" stroke="#F7F5F2" stroke-width="2.5" stroke-linejoin="round" paint-order="stroke fill"/>
      <circle cx="30" cy="-20" r="2" fill="#D4AF37"/>
      <ellipse cx="65" cy="100" rx="10" ry="3" fill="#F7F5F2"/>
      <ellipse cx="65" cy="98" rx="10" ry="2.5" fill="none" stroke="#F7F5F2" stroke-width="1.5"/>
    </g>

    <!-- Rug -->
    <rect x="-55" y="88" width="110" height="8" rx="2" fill="#5C5045" stroke="#F7F5F2" stroke-width="2" stroke-linejoin="round" paint-order="stroke fill"/>
    <line x1="-50" y1="92" x2="50" y2="92" stroke="#F7F5F2" stroke-width="0.8" stroke-linecap="round"/>

    <!-- Sofa -->
    <g filter="url(#softShadow)">
      <rect x="-38" y="22" width="76" height="24" rx="10" fill="#1A1A1A" stroke="#F7F5F2" stroke-width="2.5" stroke-linejoin="round" paint-order="stroke fill"/>
      <line x1="-22" y1="22" x2="-22" y2="32" stroke="#F7F5F2" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="22" y1="22" x2="22" y2="32" stroke="#F7F5F2" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="0" y1="22" x2="0" y2="46" stroke="#F7F5F2" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-30" y1="46" x2="30" y2="46" stroke="#F7F5F2" stroke-width="1.2" stroke-linecap="round"/>
      <rect x="-42" y="46" width="84" height="24" rx="10" fill="#1A1A1A" stroke="#F7F5F2" stroke-width="2.5" stroke-linejoin="round" paint-order="stroke fill"/>
      <line x1="0" y1="46" x2="0" y2="70" stroke="#F7F5F2" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-22" y1="58" x2="-22" y2="70" stroke="#F7F5F2" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="22" y1="58" x2="22" y2="70" stroke="#F7F5F2" stroke-width="1.2" stroke-linecap="round"/>
      <rect x="-52" y="30" width="14" height="40" rx="6" fill="#1A1A1A" stroke="#F7F5F2" stroke-width="2.5" stroke-linejoin="round" paint-order="stroke fill"/>
      <rect x="38" y="30" width="14" height="40" rx="6" fill="#1A1A1A" stroke="#F7F5F2" stroke-width="2.5" stroke-linejoin="round" paint-order="stroke fill"/>
      <rect x="-38" y="70" width="6" height="6" rx="1" fill="#F7F5F2"/>
      <rect x="32" y="70" width="6" height="6" rx="1" fill="#F7F5F2"/>
    </g>

    <!-- Plant in ribbed planter -->
    <g filter="url(#softShadow)">
      <path d="M -85 60 L -85 88 L -62 88 L -62 60 Z" fill="#5C5045" stroke="#F7F5F2" stroke-width="2.5" stroke-linejoin="round" paint-order="stroke fill"/>
      <rect x="-88" y="56" width="29" height="6" rx="1.5" fill="#5C5045" stroke="#F7F5F2" stroke-width="2.5" stroke-linejoin="round" paint-order="stroke fill"/>
      <line x1="-80" y1="62" x2="-80" y2="86" stroke="#F7F5F2" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="-75" y1="62" x2="-75" y2="86" stroke="#F7F5F2" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="-70" y1="62" x2="-70" y2="86" stroke="#F7F5F2" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="-65" y1="62" x2="-65" y2="86" stroke="#F7F5F2" stroke-width="1.2" stroke-linecap="round"/>
      <ellipse cx="-78" cy="48" rx="6" ry="11" fill="#5C8A5C" stroke="#F7F5F2" stroke-width="1.5" transform="rotate(-10 -78 48)"/>
      <ellipse cx="-70" cy="42" rx="6" ry="13" fill="#5C8A5C" stroke="#F7F5F2" stroke-width="1.5" transform="rotate(5 -70 42)"/>
      <ellipse cx="-86" cy="44" rx="5" ry="10" fill="#5C8A5C" stroke="#F7F5F2" stroke-width="1.5" transform="rotate(-25 -86 44)"/>
      <ellipse cx="-73" cy="36" rx="5" ry="11" fill="#5C8A5C" stroke="#F7F5F2" stroke-width="1.5" transform="rotate(15 -73 36)"/>
      <ellipse cx="-82" cy="34" rx="4" ry="9" fill="#5C8A5C" stroke="#F7F5F2" stroke-width="1.5" transform="rotate(-15 -82 34)"/>
      <ellipse cx="-77" cy="32" rx="2.5" ry="5" fill="#7BAA7B" stroke="#F7F5F2" stroke-width="1"/>
    </g>
  </g>

  <text x="300" y="400" font-family="Montserrat, Poppins, Gilroy, Helvetica, Arial, sans-serif"
        font-size="50" font-weight="800" fill="#F7F5F2"
        text-anchor="middle" letter-spacing="3">AURA LIVING</text>
</svg>

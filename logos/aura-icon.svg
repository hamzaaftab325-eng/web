<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <!-- AURA LIVING — Icon only (for favicon, app icon, social avatar) -->
  <rect width="600" height="600" fill="#FAF8F4"/>

  <g transform="translate(300, 300)" fill="none" stroke="#2E2E2E" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- House outline (slightly larger for icon-only context) -->
    <path d="M -130 130 L -130 -15 L 0 -125 L 130 -15 L 130 130 Z"/>

    <!-- Center wall -->
    <line x1="0" y1="-125" x2="0" y2="130"/>

    <!-- Artwork (upper-left) -->
    <rect x="-95" y="-45" width="42" height="34" rx="2" fill="#FAF8F4"/>

    <!-- Pendant lamp -->
    <line x1="0" y1="-125" x2="0" y2="-80"/>
    <path d="M -17 -80 Q -17 -62 0 -62 Q 17 -62 17 -80 Z" fill="#F2C66D"/>
    <circle cx="0" cy="-70" r="2" fill="#2E2E2E" stroke="none"/>

    <!-- Sofa -->
    <rect x="-46" y="28" width="92" height="28" rx="8" fill="#FAF8F4"/>
    <rect x="-52" y="56" width="104" height="32" rx="8" fill="#FAF8F4"/>
    <line x1="0" y1="56" x2="0" y2="88"/>
    <rect x="-64" y="40" width="14" height="48" rx="5" fill="#FAF8F4"/>
    <rect x="50" y="40" width="14" height="48" rx="5" fill="#FAF8F4"/>

    <!-- Rug -->
    <rect x="-72" y="104" width="144" height="7" rx="3.5" fill="#E9D8CC"/>

    <!-- Plant -->
    <path d="M -116 104 L -113 80 L -93 80 L -90 104 Z" fill="#E9D8CC"/>
    <ellipse cx="-105" cy="70" rx="6" ry="13" fill="#F2C66D" transform="rotate(-15 -105 70)"/>
    <ellipse cx="-97" cy="65" rx="6" ry="14" fill="#F2C66D" transform="rotate(10 -97 65)"/>
    <ellipse cx="-112" cy="68" rx="5" ry="11" fill="#F2C66D" transform="rotate(-25 -112 68)"/>
  </g>
</svg>

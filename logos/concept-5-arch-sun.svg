<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <!-- Concept 5: Arch + Sun Minimal
       A single arched doorway/portal line drawing with a small gold sun/circle
       inside it. Suggests "home" + "warmth" + "considered living".
       Most minimal, most modern. -->

  <rect width="600" height="400" fill="#FAF7F0"/>

  <g transform="translate(300, 145)">
    <!-- Arched doorway outline -->
    <path d="M -32 50 L -32 -15 Q -32 -45 0 -45 Q 32 -45 32 -15 L 32 50"
          fill="none" stroke="#1A1714" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Base line (floor) -->
    <line x1="-42" y1="50" x2="42" y2="50" stroke="#1A1714" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Small gold sun inside the arch (warmth, light, home) -->
    <circle cx="0" cy="-5" r="9" fill="#B8901F" stroke="none"/>
    <!-- Small sun rays (4 short lines) -->
    <line x1="0" y1="-20" x2="0" y2="-25" stroke="#B8901F" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="10" x2="0" y2="15" stroke="#B8901F" stroke-width="1" stroke-linecap="round"/>
    <line x1="-15" y1="-5" x2="-20" y2="-5" stroke="#B8901F" stroke-width="1" stroke-linecap="round"/>
    <line x1="15" y1="-5" x2="20" y2="-5" stroke="#B8901F" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="300" y="245"
        font-family="Playfair Display, Georgia, serif"
        font-size="62" font-weight="500"
        fill="#1A1714"
        text-anchor="middle"
        letter-spacing="-1">Aura Living</text>

  <!-- Thin gold rule -->
  <line x1="240" y1="275" x2="360" y2="275"
        stroke="#B8901F" stroke-width="0.75"/>

  <!-- Tagline -->
  <text x="300" y="300"
        font-family="Inter, Helvetica, Arial, sans-serif"
        font-size="11" font-weight="400"
        fill="#9B8D7A"
        text-anchor="middle"
        letter-spacing="4">WARM MINIMALISM · LIVED-IN ELEGANCE</text>
</svg>

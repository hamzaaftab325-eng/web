<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <!-- Concept 3: Circular Atelier Seal
       "AURA LIVING" curving around the top + "EST. 2026" curving around the bottom
       + central "A" mark. Premium atelier seal — perfect for packaging,
       business cards, wax-seal aesthetic. -->

  <rect width="600" height="400" fill="#FAF7F0"/>

  <defs>
    <path id="topArc" d="M 180 200 A 95 95 0 0 1 420 200" fill="none"/>
    <path id="bottomArc" d="M 180 200 A 95 95 0 0 0 420 200" fill="none"/>
  </defs>

  <g transform="translate(0, 0)">
    <!-- Outer ring -->
    <circle cx="300" cy="200" r="105" fill="none" stroke="#1A1714" stroke-width="1"/>
    <!-- Inner ring -->
    <circle cx="300" cy="200" r="98" fill="none" stroke="#B8901F" stroke-width="0.5"/>

    <!-- Curved "AURA LIVING" on top -->
    <text font-family="Playfair Display, Georgia, serif"
          font-size="18" font-weight="500"
          fill="#1A1714"
          letter-spacing="6">
      <textPath href="#topArc" startOffset="50%" text-anchor="middle">AURA LIVING</textPath>
    </text>

    <!-- Curved "EST. 2026 · LAHORE" on bottom -->
    <text font-family="Inter, Helvetica, Arial, sans-serif"
          font-size="10" font-weight="500"
          fill="#B8901F"
          letter-spacing="4">
      <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">EST. 2026 · LAHORE</textPath>
    </text>

    <!-- Decorative dots on sides -->
    <circle cx="195" cy="200" r="2" fill="#B8901F"/>
    <circle cx="405" cy="200" r="2" fill="#B8901F"/>

    <!-- Central "A" -->
    <text x="300" y="215"
          font-family="Playfair Display, Georgia, serif"
          font-size="56" font-weight="500"
          fill="#1A1714"
          text-anchor="middle">A</text>

    <!-- Small gold rule under A -->
    <line x1="285" y1="230" x2="315" y2="230" stroke="#B8901F" stroke-width="0.75"/>
  </g>

  <!-- Tagline -->
  <text x="300" y="350"
        font-family="Inter, Helvetica, Arial, sans-serif"
        font-size="10" font-weight="400"
        fill="#9B8D7A"
        text-anchor="middle"
        letter-spacing="3">CONSIDERED OBJECTS FOR THE CONSIDERED HOME</text>
</svg>

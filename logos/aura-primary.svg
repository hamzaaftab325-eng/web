<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <!-- AURA LIVING — Primary lockup (icon + wordmark) -->
  <!-- Handcrafted monoline, Scandinavian, geometric -->
  <!-- Palette: Charcoal #2E2E2E · Mustard #F2C66D · Beige #E9D8CC · Off-white #FAF8F4 -->

  <rect width="600" height="600" fill="#FAF8F4"/>

  <!-- ============================================================
       ICON — modern house, open front, cozy interior
       Symmetrical pentagon, centered at (300, 230)
       Stroke: 3px charcoal, rounded caps/joins, monoline
       ============================================================ -->
  <g transform="translate(300, 230)" fill="none" stroke="#2E2E2E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">

    <!-- House outline (pentagon: peak + vertical walls + base) -->
    <path d="M -90 90 L -90 -10 L 0 -85 L 90 -10 L 90 90 Z"/>

    <!-- Center vertical wall divider (interior split) -->
    <line x1="0" y1="-85" x2="0" y2="90"/>

    <!-- ============ INTERIOR ============ -->

    <!-- Framed artwork (upper-left wall) -->
    <rect x="-65" y="-30" width="30" height="24" rx="1.5" fill="#FAF8F4"/>

    <!-- Pendant lamp (center, hanging from peak) -->
    <!-- Cord -->
    <line x1="0" y1="-85" x2="0" y2="-55"/>
    <!-- Dome shade (half-ellipse) -->
    <path d="M -12 -55 Q -12 -42 0 -42 Q 12 -42 12 -55 Z" fill="#F2C66D"/>
    <!-- Light bulb hint (small dot) -->
    <circle cx="0" cy="-48" r="1.5" fill="#2E2E2E" stroke="none"/>

    <!-- Sofa (centered, lower half) -->
    <!-- Backrest -->
    <rect x="-32" y="20" width="64" height="20" rx="6" fill="#FAF8F4"/>
    <!-- Seat -->
    <rect x="-36" y="40" width="72" height="22" rx="6" fill="#FAF8F4"/>
    <!-- Center cushion divider -->
    <line x1="0" y1="40" x2="0" y2="62"/>
    <!-- Left armrest -->
    <rect x="-44" y="28" width="10" height="34" rx="4" fill="#FAF8F4"/>
    <!-- Right armrest -->
    <rect x="34" y="28" width="10" height="34" rx="4" fill="#FAF8F4"/>

    <!-- Rug (thin rectangle beneath sofa) -->
    <rect x="-50" y="72" width="100" height="5" rx="2.5" fill="#E9D8CC"/>

    <!-- Plant (left of sofa, on rug) -->
    <!-- Pot -->
    <path d="M -80 72 L -78 56 L -64 56 L -62 72 Z" fill="#E9D8CC"/>
    <!-- 3 leaves (simple ovals) -->
    <ellipse cx="-74" cy="50" rx="4" ry="9" fill="#F2C66D" transform="rotate(-15 -74 50)"/>
    <ellipse cx="-68" cy="46" rx="4" ry="10" fill="#F2C66D" transform="rotate(10 -68 46)"/>
    <ellipse cx="-78" cy="48" rx="3.5" ry="8" fill="#F2C66D" transform="rotate(-25 -78 48)"/>

  </g>

  <!-- ============================================================
       WORDMARK — AURA LIVING
       Bold geometric sans-serif, tracked, centered, charcoal
       ============================================================ -->
  <text x="300" y="430"
        font-family="Avenir Next, Montserrat, Gilroy, Helvetica, Arial, sans-serif"
        font-size="48" font-weight="800"
        fill="#2E2E2E"
        text-anchor="middle"
        letter-spacing="6">AURA LIVING</text>

  <!-- Thin mustard rule below wordmark -->
  <line x1="220" y1="460" x2="380" y2="460"
        stroke="#F2C66D" stroke-width="2" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="300" y="490"
        font-family="Avenir Next, Montserrat, Helvetica, Arial, sans-serif"
        font-size="11" font-weight="500"
        fill="#2E2E2E"
        text-anchor="middle"
        letter-spacing="5">CONSIDERED OBJECTS FOR THE CONSIDERED HOME</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <!-- DIRECTION A: Pure Wordmark
       Inspired by: Aesop, Chanel, Dior, The Row
       Philosophy: Typography IS the logo. No icon. No gradient.
       Just perfectly set type in the brand's serif font.

       Why this works:
       - Timeless (serif wordmarks haven't changed in 100 years)
       - Works at any size (16px favicon to 50ft signage)
       - Instantly premium (every luxury brand uses this approach)
       - No artifacts, no rendering issues, no halo
       - 100% consistent across every surface
  -->

  <!-- "AURA" in Playfair Display (the site's actual heading font) -->
  <text x="300" y="105"
        font-family="Playfair Display, Georgia, serif"
        font-size="64" font-weight="500"
        fill="#1A1714"
        text-anchor="middle"
        letter-spacing="2">AURA</text>

  <!-- Thin gold rule (the only decorative element) -->
  <line x1="240" y1="130" x2="360" y2="130"
        stroke="#B8901F" stroke-width="0.75"/>

  <!-- "LIVING" in tracked Inter caps (the site's body font) -->
  <text x="300" y="160"
        font-family="Inter, Helvetica, Arial, sans-serif"
        font-size="13" font-weight="500"
        fill="#B8901F"
        text-anchor="middle"
        letter-spacing="8">LIVING</text>
</svg>

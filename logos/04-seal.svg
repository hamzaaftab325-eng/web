<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <!-- Variant 4: Circular seal — "AURA LIVING" curving around + EST. 2026 + central mark -->
  <rect width="600" height="280" fill="#FAF6EE"/>

  <defs>
    <!-- Curve text along top arc -->
    <path id="topArc" d="M 130 140 A 80 80 0 0 1 290 140" fill="none"/>
    <!-- Curve text along bottom arc -->
    <path id="bottomArc" d="M 130 140 A 80 80 0 0 0 290 140" fill="none"/>
  </defs>

  <!-- Outer ring -->
  <circle cx="210" cy="140" r="86" fill="none" stroke="#1A1714" stroke-width="1"/>
  <!-- Inner ring -->
  <circle cx="210" cy="140" r="76" fill="none" stroke="#8C7340" stroke-width="0.5"/>

  <!-- Curved "AURA LIVING" on top -->
  <text font-family="Playfair Display, Georgia, serif"
        font-size="14" font-weight="500"
        fill="#1A1714"
        letter-spacing="6">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">AURA LIVING</textPath>
  </text>

  <!-- Curved "EST. 2026" on bottom -->
  <text font-family="Inter, Helvetica, sans-serif"
        font-size="9" font-weight="500"
        fill="#8C7340"
        letter-spacing="4">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">EST. 2026 · LAHORE</textPath>
  </text>

  <!-- Center mark — stylized "A" + arch line -->
  <text x="210" y="150"
        font-family="Playfair Display, Georgia, serif"
        font-size="44" font-weight="400"
        fill="#1A1714"
        text-anchor="middle">A</text>
  <line x1="186" y1="162" x2="234" y2="162" stroke="#B8923E" stroke-width="0.75"/>

  <!-- Wordmark beside (optional secondary placement) -->
  <text x="345" y="125"
        font-family="Playfair Display, Georgia, serif"
        font-size="44" font-weight="500"
        fill="#1A1714"
        letter-spacing="-0.5">Aura</text>
  <text x="345" y="160"
        font-family="Inter, Helvetica, sans-serif"
        font-size="11" font-weight="500"
        fill="#8C7340"
        letter-spacing="6">LIVING</text>
  <line x1="345" y1="142" x2="445" y2="142" stroke="#B8923E" stroke-width="0.5"/>
</svg>

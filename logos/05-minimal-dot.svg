<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" width="600" height="240">
  <!-- Variant 5: Minimal dot + wordmark — single gold dot as the "mark" -->
  <rect width="600" height="240" fill="#FAF6EE"/>

  <!-- Single gold dot above wordmark -->
  <circle cx="300" cy="80" r="5" fill="#B8923E"/>

  <!-- Wordmark -->
  <text x="300" y="155"
        font-family="Playfair Display, Georgia, serif"
        font-size="64" font-weight="400"
        fill="#1A1714"
        text-anchor="middle"
        letter-spacing="-0.5">Aura Living</text>

  <!-- Subtle tagline -->
  <text x="300" y="185"
        font-family="Inter, Helvetica, sans-serif"
        font-size="11" font-weight="400"
        fill="#8C7340"
        text-anchor="middle"
        letter-spacing="5">CONSIDERED OBJECTS</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <!-- DIRECTION B: Geometric Mark + Wordmark
       Inspired by: Airbnb (Bélo), Muuto, HAY, Notion
       Philosophy: One simple geometric shape + clean type.
       The mark is abstract enough to be memorable but not literal.

       The mark: A simplified "A" formed by two angled lines + a crossbar,
       enclosed in a thin circle. Suggests "home" (peak) + "community" (circle)
       without being a literal house illustration.

       Why this works:
       - Scales perfectly (simple geometry = crisp at 16px)
       - Distinctive (custom mark, not clipart)
       - Modern but timeless
       - Works in monochrome (no gradient needed)
  -->

  <!-- Geometric mark: circle + A-shape, left side -->
  <g transform="translate(95, 100)" fill="none" stroke="#1A1714" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="42"/>
    <!-- "A" shape: two angled lines + crossbar -->
    <line x1="-18" y1="20" x2="0" y2="-22"/>
    <line x1="18" y1="20" x2="0" y2="-22"/>
    <line x1="-10" y1="5" x2="10" y2="5"/>
    <!-- Gold dot at peak (subtle accent) -->
    <circle cx="0" cy="-22" r="2.5" fill="#B8901F" stroke="none"/>
  </g>

  <!-- Wordmark, right of mark -->
  <text x="170" y="95"
        font-family="Playfair Display, Georgia, serif"
        font-size="44" font-weight="500"
        fill="#1A1714"
        letter-spacing="1">Aura Living</text>

  <!-- Thin gold rule under wordmark -->
  <line x1="172" y1="115" x2="430" y2="115"
        stroke="#B8901F" stroke-width="0.75"/>

  <!-- Tagline -->
  <text x="170" y="140"
        font-family="Inter, Helvetica, Arial, sans-serif"
        font-size="10" font-weight="500"
        fill="#6B5D4F"
        letter-spacing="4">CONSIDERED OBJECTS</text>
</svg>

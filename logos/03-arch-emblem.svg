<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" width="600" height="240">
  <!-- Variant 3: Arch emblem — abstract arched doorway/mirror + wordmark -->
  <rect width="600" height="240" fill="#FAF6EE"/>

  <!-- Arched shape (suggests mirror / doorway / portal) -->
  <g transform="translate(120, 70)">
    <!-- Outer arch outline -->
    <path d="M 5 95 L 5 35 Q 5 5 35 5 L 55 5 Q 85 5 85 35 L 85 95"
          fill="none" stroke="#1A1714" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Inner line (suggests glass / reflection) -->
    <line x1="45" y1="20" x2="45" y2="95" stroke="#B8923E" stroke-width="0.75" opacity="0.7"/>
    <!-- Base line (ground / shelf) -->
    <line x1="-5" y1="100" x2="95" y2="100" stroke="#1A1714" stroke-width="1"/>
  </g>

  <!-- Wordmark beside -->
  <text x="265" y="120"
        font-family="Playfair Display, Georgia, serif"
        font-size="52" font-weight="500"
        fill="#1A1714"
        letter-spacing="-0.5">Aura</text>

  <!-- Thin gold rule -->
  <line x1="265" y1="140" x2="385" y2="140" stroke="#B8923E" stroke-width="0.75"/>

  <!-- "LIVING" -->
  <text x="265" y="165"
        font-family="Inter, Helvetica, sans-serif"
        font-size="12" font-weight="500"
        fill="#8C7340"
        letter-spacing="7">LIVING</text>
</svg>

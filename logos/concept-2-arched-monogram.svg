<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <!-- Concept 2: Arched Monogram
       "A" letter in Playfair Display with a thin arched line beneath it
       (suggests a mirror/doorway/portal — recurring motif in home décor).
       Wordmark beside it. Atelier / boutique feel. -->

  <rect width="600" height="400" fill="#FAF7F0"/>

  <g transform="translate(195, 200)">
    <!-- Arched frame (like a doorway or mirror outline) -->
    <path d="M -35 50 L -35 -25 Q -35 -45 0 -45 Q 35 -45 35 -25 L 35 50"
          fill="none" stroke="#1A1714" stroke-width="1.5" stroke-linecap="round"/>
    <!-- "A" centered in arch -->
    <text x="0" y="25"
          font-family="Playfair Display, Georgia, serif"
          font-size="58" font-weight="500"
          fill="#1A1714"
          text-anchor="middle">A</text>
    <!-- Small gold dot at apex of arch (subtle accent) -->
    <circle cx="0" cy="-45" r="2.5" fill="#B8901F"/>
  </g>

  <!-- Wordmark beside -->
  <text x="335" y="190"
        font-family="Playfair Display, Georgia, serif"
        font-size="56" font-weight="500"
        fill="#1A1714"
        letter-spacing="-1">Aura</text>
  <line x1="335" y1="210" x2="465" y2="210"
        stroke="#B8901F" stroke-width="0.75"/>
  <text x="335" y="232"
        font-family="Inter, Helvetica, Arial, sans-serif"
        font-size="13" font-weight="500"
        fill="#B8901F"
        letter-spacing="7">LIVING</text>

  <!-- Tagline -->
  <text x="300" y="320"
        font-family="Inter, Helvetica, Arial, sans-serif"
        font-size="10" font-weight="400"
        fill="#9B8D7A"
        text-anchor="middle"
        letter-spacing="3">EST. 2026 · LAHORE</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <!-- Aura Living — House Emblem Logo v2 (matching reference precisely) -->

  <!-- Cream preview background -->
  <rect width="600" height="500" fill="#FAF6EE"/>

  <g transform="translate(300, 195)" stroke="#1A1714" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" fill="none">

    <!-- ===== HOUSE: Single triangular roof + rectangular body ===== -->
    <!-- Roof triangle (peaked at top center) -->
    <path d="M -90 -10 L 0 -85 L 90 -10 Z" fill="#FAF6EE"/>

    <!-- Left wall (light yellow) -->
    <rect x="-90" y="-10" width="90" height="100" fill="#F5E6A3" stroke="#1A1714" stroke-width="1.5"/>

    <!-- Right wall (light tan/beige) -->
    <rect x="0" y="-10" width="90" height="100" fill="#E8D5B7" stroke="#1A1714" stroke-width="1.5"/>

    <!-- Roof outline on top (drawn after walls so it sits on top cleanly) -->
    <path d="M -90 -10 L 0 -85 L 90 -10" fill="none" stroke="#1A1714" stroke-width="1.5"/>
    <!-- Roof base line (horizontal where roof meets walls) -->
    <line x1="-90" y1="-10" x2="90" y2="-10" stroke="#1A1714" stroke-width="1.5"/>

    <!-- ===== WALL ART (upper-left, square frame) ===== -->
    <rect x="-72" y="5" width="26" height="26" fill="#C4A886" stroke="#1A1714" stroke-width="1.2"/>
    <!-- Tiny inner detail (suggests a picture) -->
    <line x1="-68" y1="22" x2="-50" y2="22" stroke="#1A1714" stroke-width="0.8"/>

    <!-- ===== PLANT (lower-left, next to sofa) ===== -->
    <!-- Pot (trapezoid — wider at top) -->
    <path d="M -78 80 L -75 65 L -60 65 L -57 80 Z" fill="#D0D0D0" stroke="#1A1714" stroke-width="1.2"/>
    <!-- Leaves (3 ovals pointing up) -->
    <ellipse cx="-72" cy="58" rx="5" ry="9" fill="#8FBC8F" stroke="#1A1714" stroke-width="1"/>
    <ellipse cx="-65" cy="55" rx="5" ry="10" fill="#8FBC8F" stroke="#1A1714" stroke-width="1"/>
    <ellipse cx="-78" cy="56" rx="4" ry="8" fill="#8FBC8F" stroke="#1A1714" stroke-width="1"/>

    <!-- ===== SOFA (centered) ===== -->
    <!-- Back rest (rounded rect) -->
    <rect x="-30" y="35" width="60" height="22" rx="4" fill="#F0F0F0" stroke="#1A1714" stroke-width="1.2"/>
    <!-- Center divider on back (two cushions) -->
    <line x1="0" y1="35" x2="0" y2="57" stroke="#1A1714" stroke-width="1"/>
    <!-- Seat (rounded rect below back) -->
    <rect x="-32" y="55" width="64" height="22" rx="4" fill="#F0F0F0" stroke="#1A1714" stroke-width="1.2"/>
    <!-- Left armrest -->
    <rect x="-38" y="45" width="8" height="32" rx="3" fill="#F0F0F0" stroke="#1A1714" stroke-width="1.2"/>
    <!-- Right armrest -->
    <rect x="30" y="45" width="8" height="32" rx="3" fill="#F0F0F0" stroke="#1A1714" stroke-width="1.2"/>

    <!-- ===== FLOOR LAMP (right side) ===== -->
    <!-- Curved pole (slight arc from base up to shade) -->
    <path d="M 60 80 Q 65 50 72 45" fill="none" stroke="#1A1714" stroke-width="1.2"/>
    <!-- Shade (trapezoid — wider at bottom) -->
    <path d="M 65 45 L 80 45 L 82 35 L 63 35 Z" fill="#FFFFFF" stroke="#1A1714" stroke-width="1.2"/>
    <!-- Base (small ellipse on floor) -->
    <ellipse cx="60" cy="80" rx="6" ry="1.5" fill="#1A1714" stroke="none"/>

  </g>

  <!-- ===== TEXT: AURA LIVING (bold sans-serif, wide letter spacing) ===== -->
  <text x="300" y="375"
        font-family="Montserrat, Poppins, Helvetica, Arial, sans-serif"
        font-size="44" font-weight="700"
        fill="#1A1714"
        text-anchor="middle"
        letter-spacing="4">AURA LIVING</text>

  <!-- ===== TEXT: SINCE 2026 (regular weight, smaller, wider spacing) ===== -->
  <text x="300" y="408"
        font-family="Montserrat, Poppins, Helvetica, Arial, sans-serif"
        font-size="14" font-weight="400"
        fill="#1A1714"
        text-anchor="middle"
        letter-spacing="6">SINCE 2026</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <!-- Aura Living — House Emblem Logo (inspired by reference) -->

  <!-- Background (transparent in production; cream for preview only) -->
  <rect width="600" height="500" fill="#FAF6EE"/>

  <!-- House emblem — centered horizontally -->
  <g transform="translate(300, 200)" stroke="#1A1714" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" fill="none">

    <!-- ===== HOUSE STRUCTURE ===== -->
    <!-- Roof — two gabled peaks joined at center ridge -->
    <!-- Left roof slope -->
    <path d="M -110 -10 L -55 -75 L 0 -10" fill="none"/>
    <!-- Right roof slope -->
    <path d="M 0 -10 L 55 -75 L 110 -10" fill="none"/>
    <!-- Horizontal ridge line connecting both peaks -->
    <line x1="-55" y1="-75" x2="55" y2="-75"/>

    <!-- Left facade fill (warm yellow) -->
    <path d="M -110 -10 L -110 80 L 0 80 L 0 -10 L -55 -75 Z" fill="#F2D58E" stroke="#1A1714" stroke-width="2"/>
    <!-- Right facade fill (warm tan) -->
    <path d="M 0 -10 L 0 80 L 110 80 L 110 -10 L 55 -75 Z" fill="#D4B896" stroke="#1A1714" stroke-width="2"/>

    <!-- ===== INTERIOR: WALL ART (on left facade) ===== -->
    <rect x="-90" y="5" width="22" height="28" fill="#D4B896" stroke="#1A1714" stroke-width="1.5"/>
    <!-- Tiny frame inside -->
    <line x1="-86" y1="9" x2="-72" y2="9" stroke="#1A1714" stroke-width="0.75"/>
    <line x1="-86" y1="19" x2="-72" y2="19" stroke="#1A1714" stroke-width="0.75"/>

    <!-- ===== INTERIOR: FLOOR LAMP (right side) ===== -->
    <!-- Curved neck -->
    <path d="M 80 80 Q 80 30 95 30" fill="none" stroke="#1A1714" stroke-width="1.5"/>
    <!-- Lamp shade (trapezoid) -->
    <path d="M 88 30 L 102 30 L 105 20 L 85 20 Z" fill="#FAF6EE" stroke="#1A1714" stroke-width="1.5"/>
    <!-- Lamp base on floor -->
    <ellipse cx="80" cy="80" rx="8" ry="2" fill="#1A1714" stroke="none"/>

    <!-- ===== INTERIOR: POTTED PLANT (left side, on floor) ===== -->
    <!-- Pot -->
    <path d="M -95 80 L -90 65 L -75 65 L -70 80 Z" fill="#C9A87C" stroke="#1A1714" stroke-width="1.5"/>
    <!-- Leaves (3 simple curves) -->
    <path d="M -82 65 Q -88 50 -85 40" fill="none" stroke="#1A1714" stroke-width="1.5"/>
    <path d="M -82 65 Q -78 48 -72 42" fill="none" stroke="#1A1714" stroke-width="1.5"/>
    <path d="M -82 65 Q -82 50 -82 38" fill="none" stroke="#1A1714" stroke-width="1.5"/>

    <!-- ===== INTERIOR: SOFA (centered) ===== -->
    <!-- Sofa back -->
    <rect x="-30" y="35" width="60" height="20" rx="3" fill="#FAF6EE" stroke="#1A1714" stroke-width="1.5"/>
    <!-- Two back cushions (divider) -->
    <line x1="0" y1="35" x2="0" y2="55" stroke="#1A1714" stroke-width="1"/>
    <!-- Sofa seat -->
    <rect x="-35" y="55" width="70" height="20" rx="3" fill="#FAF6EE" stroke="#1A1714" stroke-width="1.5"/>
    <!-- Left armrest -->
    <rect x="-40" y="45" width="10" height="30" rx="2" fill="#FAF6EE" stroke="#1A1714" stroke-width="1.5"/>
    <!-- Right armrest -->
    <rect x="30" y="45" width="10" height="30" rx="2" fill="#FAF6EE" stroke="#1A1714" stroke-width="1.5"/>
    <!-- Sofa legs -->
    <line x1="-32" y1="75" x2="-32" y2="80" stroke="#1A1714" stroke-width="1.5"/>
    <line x1="32" y1="75" x2="32" y2="80" stroke="#1A1714" stroke-width="1.5"/>

    <!-- ===== FLOOR LINE (grounds the scene) ===== -->
    <line x1="-115" y1="80" x2="115" y2="80" stroke="#1A1714" stroke-width="2"/>

  </g>

  <!-- ===== TEXT: AURA LIVING ===== -->
  <text x="300" y="370"
        font-family="Montserrat, Poppins, Helvetica, Arial, sans-serif"
        font-size="46" font-weight="700"
        fill="#1A1714"
        text-anchor="middle"
        letter-spacing="2">AURA LIVING</text>

  <!-- ===== TEXT: SINCE 2026 ===== -->
  <text x="300" y="408"
        font-family="Montserrat, Poppins, Helvetica, Arial, sans-serif"
        font-size="16" font-weight="400"
        fill="#1A1714"
        text-anchor="middle"
        letter-spacing="7">SINCE 2026</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" width="600" height="520">
  <!-- AURA LIVING — v10: based on ACTUAL pixel analysis of reference
       Background: #F0F0F0 (light gray, NOT white)
       Yellow: #F0D090 (warm golden)
       Brown: #DCC9BF (warm pinkish beige)
       House: ONE pentagon, peak slightly RIGHT of center
       Center wall divides yellow (left) from brown (right) -->

  <!-- Light gray background (matches reference) -->
  <rect width="600" height="520" fill="#F0F0F0"/>

  <g transform="translate(300, 220)" stroke="#2A2A2A" stroke-linejoin="round" stroke-linecap="round">

    <!-- ============================================================
         HOUSE — ONE PENTAGON, peak slightly RIGHT of center
         (peak at x=+8, not x=-15 like v7)
         Left section (yellow): wall + left roof slope up to peak
         Right section (brown): right roof slope down from peak + wall
         Center wall: vertical line from floor up to just below peak
         ============================================================ -->

    <!-- LEFT SECTION (yellow) — wall + left roof slope
         Path: bottom-left → up left wall → diagonal UP-RIGHT to peak (x=+8) → down to center -->
    <path d="M -70 100 L -70 -10 L 8 -55 L 8 100 Z"
          fill="#F0D090" stroke="#2A2A2A" stroke-width="1.5"/>

    <!-- RIGHT SECTION (brown) — right roof slope + wall
         Path: peak (x=+8) → diagonal DOWN-RIGHT to right wall top → down right wall → bottom-right → center bottom -->
    <path d="M 8 -55 L 70 -10 L 70 100 L 8 100 Z"
          fill="#DCC9BF" stroke="#2A2A2A" stroke-width="1.5"/>

    <!-- Center vertical wall (from floor up to just below peak) -->
    <line x1="8" y1="-55" x2="8" y2="100" stroke="#2A2A2A" stroke-width="1.2"/>

    <!-- ============================================================
         PICTURE FRAME (upper-left wall, in yellow section)
         Small rectangle with thin outline
         ============================================================ -->
    <rect x="-50" y="0" width="22" height="16" fill="#F0F0F0" stroke="#2A2A2A" stroke-width="1.2"/>

    <!-- ============================================================
         FLOOR LAMP (right side, in brown section)
         Thin curved pole + small dome shade
         ============================================================ -->
    <!-- Curved pole from floor up and arching left -->
    <path d="M 45 100 Q 52 50 44 10 Q 40 -5 25 -3"
          fill="none" stroke="#2A2A2A" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Dome shade -->
    <path d="M 19 -3 Q 19 -12 25 -12 Q 31 -12 31 -3 Z"
          fill="#F0F0F0" stroke="#2A2A2A" stroke-width="1.2"/>
    <!-- Base -->
    <ellipse cx="45" cy="100" rx="5" ry="1.5" fill="#2A2A2A" stroke="none"/>

    <!-- ============================================================
         SOFA (centered, spanning the center wall)
         Simple rounded rectangles, no cushion dividers
         ============================================================ -->
    <!-- Back rest -->
    <rect x="-25" y="42" width="50" height="16" rx="6" fill="#F0F0F0" stroke="#2A2A2A" stroke-width="1.5"/>
    <!-- Seat -->
    <rect x="-27" y="56" width="54" height="18" rx="5" fill="#F0F0F0" stroke="#2A2A2A" stroke-width="1.5"/>
    <!-- Left armrest -->
    <rect x="-32" y="48" width="8" height="26" rx="3" fill="#F0F0F0" stroke="#2A2A2A" stroke-width="1.5"/>
    <!-- Right armrest -->
    <rect x="24" y="48" width="8" height="26" rx="3" fill="#F0F0F0" stroke="#2A2A2A" stroke-width="1.5"/>

    <!-- ============================================================
         PLANT (left of sofa, in yellow section)
         Tall thin pot with 2 simple leaves
         ============================================================ -->
    <!-- Pot body (tall, thin) -->
    <rect x="-55" y="70" width="10" height="30" fill="#C0C0C0" stroke="#2A2A2A" stroke-width="1.2"/>
    <!-- Pot rim -->
    <rect x="-57" y="68" width="14" height="3" fill="#C0C0C0" stroke="#2A2A2A" stroke-width="1.2"/>
    <!-- 2 simple leaves -->
    <ellipse cx="-50" cy="62" rx="3" ry="8" fill="#8FBC8F" stroke="#2A2A2A" stroke-width="1"/>
    <ellipse cx="-47" cy="60" rx="3" ry="9" fill="#8FBC8F" stroke="#2A2A2A" stroke-width="1"/>

  </g>

  <!-- TEXT: AURA LIVING — bold, tight spacing -->
  <text x="300" y="400"
        font-family="Montserrat, Poppins, Helvetica, Arial, sans-serif"
        font-size="42" font-weight="700"
        fill="#2A2A2A"
        text-anchor="middle"
        letter-spacing="0">AURA LIVING</text>

  <!-- TEXT: SINCE 2026 — smaller, wider spacing -->
  <text x="300" y="430"
        font-family="Montserrat, Poppins, Helvetica, Arial, sans-serif"
        font-size="13" font-weight="400"
        fill="#2A2A2A"
        text-anchor="middle"
        letter-spacing="4">SINCE 2026</text>
</svg>

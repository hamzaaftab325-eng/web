<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <!-- AURA LIVING — v5: asymmetrical roof, sticker outlines, 3D depth -->

  <defs>
    <!-- Soft drop shadow for furniture layering (3D depth) -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1.5" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Floor shadow (subtle ellipse under furniture) -->
    <radialGradient id="floorShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3A3A3A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3A3A3A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- White/cream background -->
  <rect width="600" height="500" fill="#F7F5F2"/>

  <g transform="translate(300, 215)">

    <!-- ============================================================
         HOUSE — peak offset LEFT, right side roof dips LOWER
         (right wall is shorter, right roof slope is longer/gentler)
         ============================================================ -->

    <!-- Left half of house (warm mustard) — taller side
         Path: bottom-left → up to top of left wall → diagonal up-right to peak (offset LEFT of center) → down to center bottom -->
    <path d="M -100 100 L -100 -18 L -15 -90 L -15 100 Z"
          fill="#F6D58A"
          stroke="#3A3A3A" stroke-width="3"
          stroke-linejoin="round" stroke-linecap="round"
          paint-order="stroke fill"/>

    <!-- Right half of house (warm beige) — SHORTER side (roof dips lower)
         Path: peak (offset left) → diagonal down-right past center to a LOWER point on right wall → down to bottom-right → back to center bottom -->
    <path d="M -15 -90 L 100 -5 L 100 100 L -15 100 Z"
          fill="#DCC9BC"
          stroke="#3A3A3A" stroke-width="3"
          stroke-linejoin="round" stroke-linecap="round"
          paint-order="stroke fill"/>

    <!-- Center vertical seam (where walls meet, from peak down to floor) -->
    <line x1="-15" y1="-90" x2="-15" y2="100"
          stroke="#3A3A3A" stroke-width="2" stroke-linecap="round"/>

    <!-- Floor line (subtle ground reference inside house) -->
    <line x1="-100" y1="100" x2="100" y2="100"
          stroke="#3A3A3A" stroke-width="2.5" stroke-linecap="round"/>

    <!-- ============================================================
         FLOOR SHADOW (subtle 3D depth under all furniture)
         ============================================================ -->
    <ellipse cx="0" cy="100" rx="95" ry="6" fill="url(#floorShadow)"/>

    <!-- ============================================================
         FRAMED SQUARE ARTWORK (upper-left wall, above plant)
         Polished: outer frame + inner mat + horizon line
         ============================================================ -->
    <g filter="url(#softShadow)">
      <!-- Outer frame (charcoal) -->
      <rect x="-78" y="-8" width="32" height="32" rx="2"
            fill="#3A3A3A" stroke="#3A3A3A" stroke-width="2"
            stroke-linejoin="round" paint-order="stroke fill"/>
      <!-- Inner mat (off-white border) -->
      <rect x="-75" y="-5" width="26" height="26" rx="1"
            fill="#F7F5F2" stroke="none"/>
      <!-- Artwork inside (warm beige rectangle) -->
      <rect x="-72" y="-2" width="20" height="20"
            fill="#DCC9BC" stroke="none"/>
      <!-- Horizon line in artwork -->
      <line x1="-72" y1="8" x2="-52" y2="8"
            stroke="#3A3A3A" stroke-width="1.2" stroke-linecap="round"/>
      <!-- Tiny sun/circle in artwork (top-right of frame) -->
      <circle cx="-56" cy="2" r="2" fill="#F6D58A" stroke="#3A3A3A" stroke-width="0.8"/>
    </g>

    <!-- ============================================================
         ARCHED FLOOR LAMP (behind sofa, polished)
         - Base on floor, arches up and curves over to the left
         - Dome shade at the end of the arch
         - Drawn BEHIND the sofa for layering depth
         ============================================================ -->
    <g filter="url(#softShadow)">
      <!-- Arched stand — base on right, curves up and over to the left -->
      <path d="M 65 100 Q 80 50 70 0 Q 60 -25 30 -18"
            fill="none" stroke="#3A3A3A" stroke-width="3"
            stroke-linecap="round"/>
      <!-- Shade (dome) at the end of the arch -->
      <path d="M 22 -18 Q 22 -28 30 -28 Q 38 -28 38 -18 Z"
            fill="#F7F5F2"
            stroke="#3A3A3A" stroke-width="2.5"
            stroke-linejoin="round" paint-order="stroke fill"/>
      <!-- Light bulb hint (small circle inside shade) -->
      <circle cx="30" cy="-20" r="2" fill="#F6D58A" stroke="none"/>
      <!-- Lamp base (wider ellipse on floor) -->
      <ellipse cx="65" cy="100" rx="10" ry="3"
               fill="#3A3A3A" stroke="none"/>
      <!-- Base plate ring -->
      <ellipse cx="65" cy="98" rx="10" ry="2.5"
               fill="none" stroke="#3A3A3A" stroke-width="1.5"/>
    </g>

    <!-- ============================================================
         RUG (under sofa) — thin rectangle with subtle inner line
         ============================================================ -->
    <rect x="-55" y="88" width="110" height="8" rx="2"
          fill="#B8A89B"
          stroke="#3A3A3A" stroke-width="2"
          stroke-linejoin="round" paint-order="stroke fill"/>
    <!-- Rug inner detail line -->
    <line x1="-50" y1="92" x2="50" y2="92"
          stroke="#3A3A3A" stroke-width="0.8" stroke-linecap="round"/>

    <!-- ============================================================
         TWO-SEAT SOFA (centered, fully polished)
         - Layered: seat cushion, back rest, armrests, cushion dividers
         - Visible seams and rounded forms
         ============================================================ -->
    <g filter="url(#softShadow)">
      <!-- Back rest (rounded rect) -->
      <rect x="-38" y="22" width="76" height="24" rx="10"
            fill="#F7F5F2"
            stroke="#3A3A3A" stroke-width="2.5"
            stroke-linejoin="round" paint-order="stroke fill"/>
      <!-- Back cushion top seams (left + right cushions) -->
      <line x1="-22" y1="22" x2="-22" y2="32" stroke="#3A3A3A" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="22" y1="22" x2="22" y2="32" stroke="#3A3A3A" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Back cushion center seam (full height) -->
      <line x1="0" y1="22" x2="0" y2="46" stroke="#3A3A3A" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Subtle horizontal seam where back meets seat -->
      <line x1="-30" y1="46" x2="30" y2="46" stroke="#3A3A3A" stroke-width="1.2" stroke-linecap="round"/>

      <!-- Seat cushion (rounded rect below back) -->
      <rect x="-42" y="46" width="84" height="24" rx="10"
            fill="#F7F5F2"
            stroke="#3A3A3A" stroke-width="2.5"
            stroke-linejoin="round" paint-order="stroke fill"/>
      <!-- Seat cushion center seam -->
      <line x1="0" y1="46" x2="0" y2="70" stroke="#3A3A3A" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Seat cushion top seams -->
      <line x1="-22" y1="58" x2="-22" y2="70" stroke="#3A3A3A" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="22" y1="58" x2="22" y2="70" stroke="#3A3A3A" stroke-width="1.2" stroke-linecap="round"/>

      <!-- Left armrest (rounded, sits beside back+seat) -->
      <rect x="-52" y="30" width="14" height="40" rx="6"
            fill="#F7F5F2"
            stroke="#3A3A3A" stroke-width="2.5"
            stroke-linejoin="round" paint-order="stroke fill"/>
      <!-- Right armrest -->
      <rect x="38" y="30" width="14" height="40" rx="6"
            fill="#F7F5F2"
            stroke="#3A3A3A" stroke-width="2.5"
            stroke-linejoin="round" paint-order="stroke fill"/>

      <!-- Sofa legs (2 small rectangles under seat) -->
      <rect x="-38" y="70" width="6" height="6" rx="1"
            fill="#3A3A3A" stroke="none"/>
      <rect x="32" y="70" width="6" height="6" rx="1"
            fill="#3A3A3A" stroke="none"/>
    </g>

    <!-- ============================================================
         PLANT in ribbed planter (left of sofa, polished)
         - Planter with rim, vertical ribs, slight taper
         - 5 organic leaves of varied sizes
         ============================================================ -->
    <g filter="url(#softShadow)">
      <!-- Planter body (rectangular, slight taper at bottom) -->
      <path d="M -85 60 L -85 88 L -62 88 L -62 60 Z"
            fill="#B8A89B"
            stroke="#3A3A3A" stroke-width="2.5"
            stroke-linejoin="round" paint-order="stroke fill"/>
      <!-- Planter rim (wider top edge) -->
      <rect x="-88" y="56" width="29" height="6" rx="1.5"
            fill="#B8A89B"
            stroke="#3A3A3A" stroke-width="2.5"
            stroke-linejoin="round" paint-order="stroke fill"/>
      <!-- Vertical rib lines on planter (4 ribs) -->
      <line x1="-80" y1="62" x2="-80" y2="86" stroke="#3A3A3A" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="-75" y1="62" x2="-75" y2="86" stroke="#3A3A3A" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="-70" y1="62" x2="-70" y2="86" stroke="#3A3A3A" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="-65" y1="62" x2="-65" y2="86" stroke="#3A3A3A" stroke-width="1.2" stroke-linecap="round"/>

      <!-- Plant leaves (5 organic ellipses, varied sizes/angles) -->
      <ellipse cx="-78" cy="48" rx="6" ry="11" fill="#8FBC8F" stroke="#3A3A3A" stroke-width="1.5" transform="rotate(-10 -78 48)"/>
      <ellipse cx="-70" cy="42" rx="6" ry="13" fill="#8FBC8F" stroke="#3A3A3A" stroke-width="1.5" transform="rotate(5 -70 42)"/>
      <ellipse cx="-86" cy="44" rx="5" ry="10" fill="#8FBC8F" stroke="#3A3A3A" stroke-width="1.5" transform="rotate(-25 -86 44)"/>
      <ellipse cx="-73" cy="36" rx="5" ry="11" fill="#8FBC8F" stroke="#3A3A3A" stroke-width="1.5" transform="rotate(15 -73 36)"/>
      <ellipse cx="-82" cy="34" rx="4" ry="9" fill="#8FBC8F" stroke="#3A3A3A" stroke-width="1.5" transform="rotate(-15 -82 34)"/>
      <!-- Tiny new growth (center sprout) -->
      <ellipse cx="-77" cy="32" rx="2.5" ry="5" fill="#A8D0A8" stroke="#3A3A3A" stroke-width="1"/>
    </g>

  </g>

  <!-- ============================================================
       BRAND NAME: AURA LIVING — ExtraBold, uppercase, centered
       ============================================================ -->
  <text x="300" y="400"
        font-family="Montserrat, Poppins, Gilroy, Helvetica, Arial, sans-serif"
        font-size="50" font-weight="800"
        fill="#3A3A3A"
        text-anchor="middle"
        letter-spacing="3">AURA LIVING</text>
</svg>

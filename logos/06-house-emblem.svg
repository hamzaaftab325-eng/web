<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" width="600" height="520">
  <!-- AURA LIVING — v7: clean, simple, matches reference exactly
       Single triangular roof (peak slightly left = right side "down")
       Single pentagon shape, no gaps, simple furniture -->

  <rect width="600" height="520" fill="#FFFFFF"/>

  <g transform="translate(300, 220)" stroke="#000000" stroke-linejoin="round" stroke-linecap="round">

    <!-- ============================================================
         HOUSE — single pentagon, peak offset LEFT (right side "down")
         Left half = yellow, right half = brown, NO white gaps
         ============================================================ -->

    <!-- Left half of house (yellow): bottom-left → up → diagonal to peak → down to center bottom -->
    <path d="M -65 100 L -65 -12 L -10 -70 L -10 100 Z"
          fill="#F5E6A3" stroke="#000000" stroke-width="2"/>

    <!-- Right half of house (brown): peak → diagonal down (longer, lower) → bottom-right → center bottom -->
    <path d="M -10 -70 L 65 -12 L 65 100 L -10 100 Z"
          fill="#D4B896" stroke="#000000" stroke-width="2"/>

    <!-- Center vertical seam -->
    <line x1="-10" y1="-70" x2="-10" y2="100" stroke="#000000" stroke-width="1.5"/>

    <!-- ============================================================
         PICTURE FRAME (small square, plain, upper-left wall)
         ============================================================ -->
    <rect x="-50" y="0" width="20" height="20" fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>

    <!-- ============================================================
         FLOOR LAMP — curved arm + small dome shade (right of sofa)
         ============================================================ -->
    <path d="M 40 100 Q 50 50 42 5 Q 38 -10 22 -8"
          fill="none" stroke="#000000" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Shade (small dome / half-circle) -->
    <path d="M 16 -8 Q 16 -16 22 -16 Q 28 -16 28 -8 Z"
          fill="#FFFFFF" stroke="#000000" stroke-width="1.5"/>
    <!-- Base on floor -->
    <ellipse cx="40" cy="100" rx="6" ry="2" fill="#000000" stroke="none"/>

    <!-- ============================================================
         SOFA — simple, curved-back, NO cushion dividers, NO legs
         ============================================================ -->
    <!-- Back rest (rounded rectangle, pure white) -->
    <rect x="-28" y="40" width="56" height="18" rx="7" fill="#FFFFFF" stroke="#000000" stroke-width="1.8"/>
    <!-- Seat (rounded rectangle below back) -->
    <rect x="-30" y="56" width="60" height="20" rx="6" fill="#FFFFFF" stroke="#000000" stroke-width="1.8"/>
    <!-- Left armrest -->
    <rect x="-36" y="48" width="9" height="28" rx="4" fill="#FFFFFF" stroke="#000000" stroke-width="1.8"/>
    <!-- Right armrest -->
    <rect x="27" y="48" width="9" height="28" rx="4" fill="#FFFFFF" stroke="#000000" stroke-width="1.8"/>

    <!-- ============================================================
         PLANT — TALL THIN pot with sparse leaves (left of sofa)
         ============================================================ -->
    <!-- Tall thin pot -->
    <rect x="-58" y="72" width="12" height="28" fill="#666666" stroke="#000000" stroke-width="1.5"/>
    <!-- Pot rim -->
    <rect x="-60" y="70" width="16" height="3" fill="#666666" stroke="#000000" stroke-width="1.5"/>
    <!-- 3 sparse simple leaves -->
    <ellipse cx="-54" cy="62" rx="3" ry="8" fill="#8FBC8F" stroke="#000000" stroke-width="1.2" transform="rotate(-15 -54 62)"/>
    <ellipse cx="-50" cy="60" rx="3" ry="9" fill="#8FBC8F" stroke="#000000" stroke-width="1.2" transform="rotate(10 -50 60)"/>
    <ellipse cx="-56" cy="58" rx="2.5" ry="7" fill="#8FBC8F" stroke="#000000" stroke-width="1.2" transform="rotate(-25 -56 58)"/>

  </g>

  <!-- ============================================================
       TEXT: AURA LIVING — bold sans-serif, TIGHT letter spacing, BLACK
       ============================================================ -->
  <text x="300" y="410"
        font-family="Montserrat, Poppins, Helvetica, Arial, sans-serif"
        font-size="46" font-weight="700"
        fill="#000000"
        text-anchor="middle"
        letter-spacing="0">AURA LIVING</text>

  <!-- ============================================================
       TEXT: SINCE 2026 — smaller, wider letter spacing, centered
       ============================================================ -->
  <text x="300" y="445"
        font-family="Montserrat, Poppins, Helvetica, Arial, sans-serif"
        font-size="14" font-weight="400"
        fill="#000000"
        text-anchor="middle"
        letter-spacing="5">SINCE 2026</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <!-- Concept 1: Editorial Wordmark
       Pure typography. "Aura" in Playfair Display (serif, elegant) +
       thin gold rule + "LIVING" in tracked Inter caps (sans-serif).
       Magazine-style, premium, minimal. -->

  <rect width="600" height="400" fill="#FAF7F0"/>

  <!-- "Aura" — Playfair Display serif, large -->
  <text x="300" y="180"
        font-family="Playfair Display, Georgia, serif"
        font-size="92" font-weight="500"
        fill="#1A1714"
        text-anchor="middle"
        letter-spacing="-1">Aura</text>

  <!-- Thin gold rule -->
  <line x1="240" y1="215" x2="360" y2="215"
        stroke="#B8901F" stroke-width="1"/>

  <!-- "LIVING" — Inter sans-serif, tracked caps -->
  <text x="300" y="250"
        font-family="Inter, Helvetica, Arial, sans-serif"
        font-size="16" font-weight="500"
        fill="#B8901F"
        text-anchor="middle"
        letter-spacing="9">LIVING</text>

  <!-- Tagline -->
  <text x="300" y="290"
        font-family="Inter, Helvetica, Arial, sans-serif"
        font-size="11" font-weight="400"
        fill="#9B8D7A"
        text-anchor="middle"
        letter-spacing="3">CONSIDERED OBJECTS FOR THE CONSIDERED HOME</text>
</svg>
